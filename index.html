<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meerim Keldibekova — Model Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@1,300;1,400;1,500&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

    <header class="hero-split">
        <div class="hero-text-side">
            <span class="sub-title">OFFICIAL PORTFOLIO</span>
            <h1>MEERIM<br>KELDIBEKOVA</h1>
            <p class="model-badge">FASHION MODEL</p>
        </div>
        <div class="hero-image-side">
            <div class="photo-frame">
                <img src="main-photo.JPG" alt="Model Portrait">
            </div>
        </div>
    </header>

    <section class="measurements">
        <h2 class="section-title">MEASUREMENTS</h2>
        <div class="stats-table">
            <div class="stat-row"><span>HEIGHT</span><span>173 CM</span></div>
            <div class="stat-row"><span>BUST</span><span>80 CM</span></div>
            <div class="stat-row"><span>WAIST</span><span>60 CM</span></div>
            <div class="stat-row"><span>HIPS</span><span>89 CM</span></div>
            <div class="stat-row"><span>SHOES</span><span>38 EU</span></div>
            <div class="stat-row"><span>HAIR</span><span>BLACK</span></div>
            <div class="stat-row"><span>EYES</span><span>BROWN</span></div>
        </div>
    </section>

    <section class="gallery">
        <h2 class="section-title">EDITORIAL & TESTS</h2>
        <div class="editorial-grid">
            <div class="grid-item"><div class="img-wrapper"><img src="pro1.JPG" alt="Professional Portfolio 1"></div></div>
            <div class="grid-item"><div class="img-wrapper"><img src="pro2.JPG" alt="Professional Portfolio 2"></div></div>
            <div class="grid-item"><div class="img-wrapper"><img src="pro3.JPG" alt="Professional Portfolio 3"></div></div>
            <div class="grid-item"><div class="img-wrapper"><img src="pro4.JPG" alt="Professional Portfolio 4"></div></div>
        </div>
    </section>

    <section class="editorial-collage">
    <h2 class="section-title">POLAROIDS & CASUAL</h2>
    <p class="section-subtitle">No makeup, no retouch — raw polaroids and casual snapshots.</p>

    <div class="collage-grid">
        <div class="collage-item collage-large">
            <img src="casual1.JPG" alt="Casual Look 1">
        </div>
        <div class="collage-item collage-small">
            <img src="casual2.JPG" alt="Casual Look 2">
        </div>
        <div class="collage-item collage-small">
            <img src="casual3.JPG" alt="Casual Look 3">
        </div>
        <div class="collage-item collage-wide">
            <img src="casual4.JPG" alt="Casual Look 4">
        </div>
    </div>
</section>

    <footer class="contacts">
        <h2 class="section-title">BOOKING & INQUIRIES</h2>
        <div class="contact-links">
            <a href="mailto:kkmeeriim@gmail.com" class="booking-btn">SEND AN EMAIL</a>
            <div class="socials">
                <a href="https://www.instagram.com/kvmeerim/" target="_blank">INSTAGRAM</a>
                <a href="https://t.me" target="_blank">TELEGRAM</a>
            </div>
        </div>
    </footer>

</html>
